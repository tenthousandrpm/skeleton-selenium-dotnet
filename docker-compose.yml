services:
  chrome:
    image: selenium/standalone-chrome:latest
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 5s
      timeout: 5s
      retries: 5

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SeleniumHub=http://chrome:4444
      - HEADLESS=true
    depends_on:
      chrome:
        condition: service_healthy
